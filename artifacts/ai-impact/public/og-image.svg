<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f1f0f"/>
      <stop offset="100%" stop-color="#1a2e1a"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#64748b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#64748b" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#22c55e" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Green glow orb top-right -->
  <circle cx="1050" cy="80" r="180" fill="#22c55e" fill-opacity="0.06"/>
  <circle cx="1050" cy="80" r="100" fill="#22c55e" fill-opacity="0.05"/>

  <!-- Amber glow bottom-left -->
  <circle cx="150" cy="560" r="140" fill="#f59e0b" fill-opacity="0.05"/>

  <!-- Logo mark -->
  <g transform="translate(80, 72)">
    <rect width="52" height="52" rx="14" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-opacity="0.3" stroke-width="1"/>
    <!-- Leaf icon simplified -->
    <path d="M26 38 C26 38 14 30 14 20 C14 14 20 10 26 10 C32 10 38 14 38 20 C38 30 26 38 26 38Z" fill="#22c55e" fill-opacity="0.8"/>
    <line x1="26" y1="38" x2="26" y2="22" stroke="#0f1f0f" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- App name -->
  <text x="148" y="97" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#22c55e" letter-spacing="0.5">AI Impact</text>
  <text x="148" y="117" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4ade80" fill-opacity="0.6" letter-spacing="1.5">TRACKER</text>

  <!-- Main headline -->
  <text x="80" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="700" fill="#f0fdf4" letter-spacing="-1">Know Your</text>
  <text x="80" y="296" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="700" fill="#22c55e" letter-spacing="-1">AI Footprint</text>

  <!-- Subheadline -->
  <text x="80" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#86efac" fill-opacity="0.7" letter-spacing="0">Track water, carbon &amp; energy from every AI session.</text>

  <!-- Divider -->
  <line x1="80" y1="378" x2="420" y2="378" stroke="#22c55e" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Feature pills -->
  <g transform="translate(80, 398)">
    <!-- Pill 1 -->
    <rect width="130" height="32" rx="16" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.25" stroke-width="1"/>
    <text x="16" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#86efac">Session Logging</text>

    <!-- Pill 2 -->
    <rect x="144" width="116" height="32" rx="16" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.25" stroke-width="1"/>
    <text x="160" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#86efac">Trend Reports</text>

    <!-- Pill 3 -->
    <rect x="274" width="96" height="32" rx="16" fill="#22c55e" fill-opacity="0.12" stroke="#22c55e" stroke-opacity="0.25" stroke-width="1"/>
    <text x="290" y="21" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#86efac">Goals &amp; Limits</text>
  </g>

  <!-- Metric cards (right side) -->
  <!-- Card: Water -->
  <g transform="translate(660, 140)">
    <rect width="220" height="100" rx="16" fill="url(#card1)" stroke="#22c55e" stroke-opacity="0.2" stroke-width="1"/>
    <!-- Droplet icon -->
    <text x="20" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#86efac" fill-opacity="0.6" letter-spacing="0.5">WATER FOOTPRINT</text>
    <text x="20" y="72" font-family="system-ui, -apple-system, monospace" font-size="32" font-weight="700" fill="#4ade80">2.01 L</text>
    <text x="20" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#86efac" fill-opacity="0.5">per week</text>
  </g>

  <!-- Card: Carbon -->
  <g transform="translate(900, 140)">
    <rect width="220" height="100" rx="16" fill="url(#card2)" stroke="#94a3b8" stroke-opacity="0.2" stroke-width="1"/>
    <text x="20" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" fill-opacity="0.8" letter-spacing="0.5">CARBON EMITTED</text>
    <text x="20" y="72" font-family="system-ui, -apple-system, monospace" font-size="32" font-weight="700" fill="#cbd5e1">760 g</text>
    <text x="20" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" fill-opacity="0.5">CO₂ this week</text>
  </g>

  <!-- Card: Energy -->
  <g transform="translate(660, 260)">
    <rect width="220" height="100" rx="16" fill="url(#card3)" stroke="#f59e0b" stroke-opacity="0.2" stroke-width="1"/>
    <text x="20" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fcd34d" fill-opacity="0.8" letter-spacing="0.5">ENERGY CONSUMED</text>
    <text x="20" y="72" font-family="system-ui, -apple-system, monospace" font-size="32" font-weight="700" fill="#fde68a">2 Wh</text>
    <text x="20" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#fcd34d" fill-opacity="0.5">this week</text>
  </g>

  <!-- Card: Top Tool -->
  <g transform="translate(900, 260)">
    <rect width="220" height="100" rx="16" fill="#1e3a1e" stroke="#22c55e" stroke-opacity="0.15" stroke-width="1"/>
    <text x="20" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#86efac" fill-opacity="0.6" letter-spacing="0.5">TOP TOOL</text>
    <text x="20" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#f0fdf4">ChatGPT 4o</text>
    <text x="20" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#86efac" fill-opacity="0.5">375 g CO₂ this week</text>
  </g>

  <!-- Mini bar chart -->
  <g transform="translate(660, 390)">
    <rect width="460" height="120" rx="16" fill="#111f11" stroke="#22c55e" stroke-opacity="0.1" stroke-width="1"/>
    <text x="20" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#86efac" fill-opacity="0.5" letter-spacing="0.5">WEEKLY TREND</text>

    <!-- Bars -->
    <g transform="translate(20, 95)">
      <rect x="0"   y="-28" width="44" height="28" rx="4" fill="#22c55e" fill-opacity="0.4"/>
      <rect x="54"  y="-44" width="44" height="44" rx="4" fill="#22c55e" fill-opacity="0.5"/>
      <rect x="108" y="-22" width="44" height="22" rx="4" fill="#22c55e" fill-opacity="0.35"/>
      <rect x="162" y="-58" width="44" height="58" rx="4" fill="#22c55e" fill-opacity="0.6"/>
      <rect x="216" y="-36" width="44" height="36" rx="4" fill="#22c55e" fill-opacity="0.45"/>
      <rect x="270" y="-16" width="44" height="16" rx="4" fill="#22c55e" fill-opacity="0.3"/>
      <rect x="324" y="-48" width="44" height="48" rx="4" fill="#4ade80" fill-opacity="0.7"/>

      <text x="22"  y="14" font-family="monospace" font-size="10" fill="#86efac" fill-opacity="0.4" text-anchor="middle">M</text>
      <text x="76"  y="14" font-family="monospace" font-size="10" fill="#86efac" fill-opacity="0.4" text-anchor="middle">T</text>
      <text x="130" y="14" font-family="monospace" font-size="10" fill="#86efac" fill-opacity="0.4" text-anchor="middle">W</text>
      <text x="184" y="14" font-family="monospace" font-size="10" fill="#86efac" fill-opacity="0.4" text-anchor="middle">T</text>
      <text x="238" y="14" font-family="monospace" font-size="10" fill="#86efac" fill-opacity="0.4" text-anchor="middle">F</text>
      <text x="292" y="14" font-family="monospace" font-size="10" fill="#86efac" fill-opacity="0.4" text-anchor="middle">S</text>
      <text x="346" y="14" font-family="monospace" font-size="10" fill="#4ade80" fill-opacity="0.7" text-anchor="middle">S</text>
    </g>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="620" width="1200" height="10" fill="#22c55e" fill-opacity="0.4"/>
  <rect x="0" y="624" width="600" height="6" fill="#22c55e" fill-opacity="0.3"/>
</svg>
